name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Typecheck SDK
        run: npm run typecheck --workspace=@mmos/sdk
      
      # @mmos/runtime imports @mmos/sdk via its built dist/ output (not
      # source .ts directly), so both the typecheck and the test step below
      # need SDK built first — otherwise they fail on a clean checkout with
      # "Cannot find module '@mmos/sdk'" even though the code itself is fine.
      - name: Build SDK
        run: npm run build --workspace=@mmos/sdk
      
      - name: Typecheck Runtime
        run: npm run typecheck --workspace=@mmos/runtime
      
      - name: Typecheck Examples
        run: npm run typecheck --workspace=@mmos/examples
      
      - name: Test SDK
        run: npm test --workspace=@mmos/sdk
      
      - name: Test Runtime
        run: npm test --workspace=@mmos/runtime

  # Note: @mmos/examples has no "build" step by design — it's source-only,
  # consumed directly via its .ts exports (see packages/examples/package.json),
  # not bundled or published. It's still covered above by Typecheck Examples.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build SDK
        run: npm run build --workspace=@mmos/sdk
      
      - name: Build Runtime
        run: npm run build --workspace=@mmos/runtime